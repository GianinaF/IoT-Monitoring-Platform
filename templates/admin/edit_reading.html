{% extends 'base.html' %}

{% block title %}Edit Reading{% endblock %}

{% block content %}
<h1>Edit Sensor Reading</h1>
<p>Update the selected sensor reading.</p>
<form method="POST" action="{{ url_for('edit_reading', reading_id=reading.reading_id) }}" onsubmit="return validateReadingForm();">
    <label>Sensor</label>
    <select name="sensor_id" required>
        {% for sensor in sensors %}
            <option value="{{ sensor.sensor_id }}"
                {% if sensor.sensor_id == reading.sensor_id %}selected{% endif %}>
                {{ sensor.device_name }} - {{ sensor.sensor_name }} ({{ sensor.location }})
            </option>
        {% endfor %}
    </select>

    <label>Value</label>
    <input type="number" step="0.01" name="value" value="{{ reading.value }}" required>

    <button type="submit">Save Changes</button>
</form>

<br>

<a class="btn" href="{{ url_for('admin_readings') }}">Back to Readings</a>
{% endblock %}
