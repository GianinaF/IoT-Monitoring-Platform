{% extends 'base.html' %}

{% block title %}Sensor Readings{% endblock %}

{% block content %}
<h2>Sensor Readings</h2>

<section>
    <h3>Add New Reading</h3>

    <form method="POST" action="#">
        <label>Sensor</label>
        <select name="sensor_id" required>
            <option value="">Select sensor</option>
            <option value="1">Temperature Sensor</option>
            <option value="2">Humidity Sensor</option>
        </select>

        <label>Value</label>
        <input type="number" step="0.01" name="value" placeholder="Enter value" required>

        <button type="submit">Add Reading</button>
    </form>
</section>

<section>
    <h3>All Readings</h3>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Device</th>
                <th>Sensor Type</th>
                <th>Value</th>
                <th>Time</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>Temperature Sensor 1</td>
                <td>Temperature</td>
                <td>25.5 °C</td>
                <td>2026-04-15 12:00</td>
                <td>
                    <a class="btn" href="{{ url_for('edit_reading', reading_id=1) }}">Edit</a>
                    <button type="button" onclick="confirmDelete()">Delete</button>
                </td>
            </tr>
        </tbody>
    </table>
</section>
{% endblock %}
