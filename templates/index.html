{% extends 'base.html' %}

{% block title %}Home{% endblock %}

{% block content %}
<section class="cards">
    <div class="card">
        <h3>Total Devices</h3>
        <p id="totalDevices">0</p>
    </div>
    <div class="card">
        <h3>Online Devices</h3>
        <p id="onlineDevices">0</p>
    </div>
    <div class="card">
        <h3>Total Alerts</h3>
        <p id="totalAlerts">0</p>
    </div>
</section>

<section>
    <h2>Recent Devices</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Status</th>
                <th>Value</th>
            </tr>
        </thead>
        <tbody id="deviceTableBody"></tbody>
    </table>
</section>

<section>
    <h2>Device Data Chart</h2>
    <canvas id="deviceChart"></canvas>
</section>

<a href="{{ url_for('login') }}">Go to Login</a>
{% endblock %}
